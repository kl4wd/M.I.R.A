services:
  mira-mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mira-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - mira-network

  # LLM local — dashboard (hôte) : OLLAMA_URL=http://127.0.0.1:11434
  # Depuis les autres services Docker : http://ollama:11434
  ollama:
    image: ollama/ollama:latest
    container_name: mira-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./LLM/Modelfile:/config/Modelfile:ro
    networks:
      - mira-network

  mira-stt:
    build: ./STT
    container_name: mira-stt
    restart: unless-stopped
    privileged: true
    devices:
      - "/dev/snd:/dev/snd"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=mira
      - MQTT_BROKER=mira-mosquitto
      - MQTT_PORT=1883
      - ROBOT_ID=mira-robot
    networks:
      - mira-network
    depends_on:
      - mira-mosquitto
      - ollama

  mira-vision:
    build: ./vision 
    container_name: mira-vision
    privileged: true
    networks:
      - mira-network
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /usr/share/imx500-models:/usr/share/imx500-models:ro
      - /sys/kernel/debug:/sys/kernel/debug
    environment:
      - MQTT_BROKER=mira-mosquitto
    restart: always
    depends_on:
      - mira-mosquitto

  mira-bridge:
    build: ./bridge
    container_name: mira-bridge
    restart: unless-stopped
    privileged: true
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      - MQTT_BROKER=mira-mosquitto
      - MQTT_PORT=1883
      - UART_PORT=/dev/ttyUSB0
      - UART_BAUD=115200
    networks:
      - mira-network
    depends_on:
      - mira-mosquitto

  mira-tts:
    build: ./TTS
    container_name: mira-tts
    restart: unless-stopped
    privileged: true
    devices:
      - "/dev/snd:/dev/snd"
    environment:
      - MQTT_BROKER=mira-mosquitto
      - MQTT_PORT=1883
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    volumes:
      - /run/user/1000/pulse:/run/user/1000/pulse
      - ~/.config/pulse/cookie:/root/.config/pulse/cookie:ro
    networks:
      - mira-network
    depends_on:
      - mira-mosquitto

networks:
  mira-network:
    name: mira-network
    driver: bridge

volumes:
  ollama_data: