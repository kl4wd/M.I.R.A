services:
  # ── BROKER MQTT (Le cœur de la communication) ─────────────────
  mira-mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mira-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - mira-network

  # ── LLM (Le cerveau de M.I.R.A) ───────────────────────────────
  mira-ollama:
    image: ollama/ollama:latest
    container_name: mira-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    dns:
      - 8.8.8.8
    volumes:
      - ./LLM/ollama_data:/root/.ollama
    networks:
      - mira-network
    deploy:
      resources:
        limits:
          cpus: "2.8" # On bride à 2.8 pour laisser 1.2 cœur au reste (STT + Vision)

  # ── STT & ORCHESTRATEUR (L'écouteur) ──────────────────────────
  mira-stt:
    build: ./STT
    container_name: mira-stt
    restart: unless-stopped
    privileged: true
    devices:
      - "/dev/snd:/dev/snd"
    environment:
      - OLLAMA_URL=http://mira-ollama:11434/api/generate
      - OLLAMA_MODEL=mira # Pense à utiliser tinyllama si c'est trop lent
      - MQTT_BROKER=mira-mosquitto
      - MQTT_PORT=1883
    networks:
      - mira-network
    depends_on:
      - mira-mosquitto
      - mira-ollama
    deploy:
      resources:
        reservations:
          cpus: "0.8" # On garantit de la puissance pour l'audio en temps réel

  # ── VISION (Les yeux via IMX500) ─────────────────────────────
  mira-vision:
    build: ./vision # Vérifie bien que ton dossier s'appelle 'Vision' avec une majuscule ou modifie ici
    container_name: mira-vision
    privileged: true
    networks:
      - mira-network
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /usr/share/imx500-models:/usr/share/imx500-models:ro
      - /sys/kernel/debug:/sys/kernel/debug
    environment:
      - MQTT_BROKER=mira-mosquitto
    restart: always
    depends_on:
      - mira-mosquitto

  # ── BRIDGE MQTT → UART (ESP32) ─────────────────────────────────────────────
  mira-bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    container_name: mira-bridge
    restart: unless-stopped
    privileged: true
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      - MQTT_BROKER=mira-mosquitto
      - MQTT_PORT=1883
      - UART_PORT=/dev/ttyUSB0
      - UART_BAUD=115200
    networks:
      - mira-network
    depends_on:
      - mira-mosquitto

networks:
  mira-network:
    name: mira-network
    driver: bridge