services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mira-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - /home/mira/M.I.R.A/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - mira-network

  ollama:
    image: ollama/ollama:latest
    container_name: mira-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /home/mira/M.I.R.A/jeece_data/ollama_data:/root/.ollama
    networks:
      - mira-network

  mira-bridge:
    build:
      context: /home/mira/M.I.R.A/Bridge
    container_name: mira-bridge
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - MQTT_HOST=mosquitto
      - SERIAL_PORT=/dev/ttyUSB0
    privileged: true
    networks:
      - mira-network

  mira-llm:
    build:
      context: /home/mira/M.I.R.A/LLM
    container_name: mira-llm
    restart: unless-stopped
    depends_on:
      - mosquitto
      - ollama
    environment:
      - MQTT_HOST=mosquitto
      - OLLAMA_URL=http://ollama:11434/api/generate
    volumes:
      - /home/mira/M.I.R.A/jeece_data:/app/jeece_data
    privileged: true
    devices:
      - "/dev/snd:/dev/snd"
    networks:
      - mira-network

  mira-vision:
    build:
      context: /home/mira/M.I.R.A/Vision
    container_name: mira-vision
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - MQTT_HOST=mosquitto
    privileged: true
    devices:
      - "/dev/video0:/dev/video0"
    networks:
      - mira-network

  mira-stt:
    build:
      context: /home/mira/M.I.R.A/STT/vosk-stt-fr
    container_name: mira-stt
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - MQTT_HOST=mosquitto
    privileged: true
    devices:
      - "/dev/snd:/dev/snd"
    networks:
      - mira-network

networks:
  mira-network:
    driver: bridge